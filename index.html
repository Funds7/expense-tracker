<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>

  <link rel="stylesheet" href="style-v2.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0f172a">
</head>

  <body>

  <div class="container">

  <div class="header">
    <div class="image-box">
  <img src="icon.png" class="logo">
    </div>
    <h1>Expense Tracker</h1>
    <p>Track your income and expenses easily</p>
  </div>

    <!-- DASHBOARD -->
    <div class="dashboard">
      <div class="card income-card">
        <p>Total Income</p>
        <h3 id="totalIncome">$0</h3>
      </div>     

      <div class="card expense-card">
        <p>Total Expense</p>
        <h3 id="totalExpense">$0</h3>
      </div>

      <div class="card balance-card">
        <p>Balance</p>
        <h3 id="balance">$0</h3>
      </div>
   </div>
    
<p style="color:#22c55e;">● Live tracking active</p>
    
    <div class="chart-box">
       <canvas id="financeChart"></canvas>
    </div>

    <div class="controls">
      <button onclick="toggleCurrency()">Switch Currency</button>
      <button onclick="toggleTheme()">Toggle Theme</button>
    </div>

    <div class="buttons">
      <button onclick="addIncome()">+ Income</button>
      <button onclick="addExpense()">- Expense</button>
    </div>

    <ul id="history"></ul>
  </div>

  <script src="script.js"></script>

  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
  </script>

</body>
</html>
