<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker Premium</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <h1>💎 Expense Tracker Premium</h1>

  <div class="card">
    <h3>Balance</h3>
    <h2 id="balance">$0</h2>
  </div>

  <div class="card small">
    <p>Income: <span id="income">$0</span></p>
    <p>Expense: <span id="expense">$0</span></p>
  </div>

  <div class="form">
    <input type="text" id="desc" placeholder="Description">

    <select id="category">
      <option>Food</option>
      <option>Transport</option>
      <option>Shopping</option>
      <option>Bills</option>
      <option>Other</option>
    </select>

    <input type="number" id="amount" placeholder="Amount">

    <div class="buttons">
      <button onclick="addIncome()">+ Income</button>
      <button onclick="addExpense()">- Expense</button>
    </div>
  </div>

  <canvas id="chart"></canvas>

  <h3>History (Tap to delete)</h3>
  <ul id="history"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
